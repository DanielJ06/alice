<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>O Livro de Convidados — Chá da Alice</title>
<meta name="description" content="Confirmações do Chá de Bebê da Alice, em um só lugar.">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&family=Pinyon+Script&display=swap" rel="stylesheet">
<script src="./scripts/config.js"></script>
<style>
  :root {
    --canvas:#35597A; --ink:#416688; --paper:#F7F4D5; --moss:#E0C274;
    --rose:#D3968C; --rose-bright:#E7B2A8; --rose-deep:#BE7E71;
    --display:'Cormorant Garamond', serif;
    --body:'EB Garamond', serif;
    --label:'Jost', sans-serif;
    --line: rgba(65,102,136,.16);
    --ink-soft: rgba(65,102,136,.66);
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body {
    background: var(--canvas);
    color: var(--ink);
    font-family: var(--body);
    -webkit-font-smoothing: antialiased;
    font-variant-numeric: tabular-nums lining-nums;
    font-feature-settings: "lnum" 1, "tnum" 1;
    min-height: 100vh;
  }
  ::selection { background: var(--rose); color: var(--ink); }

  .page {
    width: 100%;
    max-width: 468px;
    margin: 0 auto;
    background: var(--paper);
    min-height: 100vh;
    box-shadow: 0 0 70px rgba(0,0,0,.45);
    position: relative;
    overflow: hidden;
    padding-bottom: 48px;
  }
  /* moldura interna, como no convite */
  .frame { position: fixed; pointer-events: none; z-index: 5; }

  /* ilustrações decorativas discretas */
  .illus { position:absolute; pointer-events:none; user-select:none; -webkit-user-select:none; mix-blend-mode:multiply; }

  /* ===== HEADER ===== */
  header {
    background: radial-gradient(125% 95% at 50% 2%, #5A83AD 0%, #47709A 40%, var(--ink) 100%);
    color: var(--paper);
    text-align: center;
    padding: 40px 30px 34px;
    position: relative;
    overflow: hidden;
  }
  header .frame-in { position:absolute; inset:12px; border:1px solid rgba(247,244,213,.16); pointer-events:none; }
  .illus-d { mix-blend-mode: screen; }
  .eyebrow {
    font-family: var(--label); text-transform: uppercase; letter-spacing:.36em;
    font-size: 10px; color: var(--moss); margin-bottom: 14px; position: relative;
  }
  .flourish {
    font-family: 'Pinyon Script', cursive; font-size: 30px; line-height: 1;
    color: var(--rose-bright); margin-bottom: 2px; position: relative;
  }
  header h1 {
    font-family: var(--display); font-weight: 600; font-size: 40px; line-height: 1;
    letter-spacing: .04em; margin: 4px 0 10px; color: var(--paper); position: relative;
  }
  .rule { display:flex; align-items:center; gap:11px; justify-content:center; color:var(--moss); position: relative; }
  .rule span.l { height:1px; width:34px; background:currentColor; opacity:.5; }
  .rule span.d { width:6px; height:6px; transform:rotate(45deg); border:1px solid currentColor; }

  /* ===== STATS ===== */
  .stats {
    background: var(--ink);
    color: var(--paper);
    border-top: 1px solid rgba(247,244,213,.12);
    text-align: center;
    padding: 22px 8px 24px;
  }
  .stat b {
    display:block; font-family: var(--display); font-weight: 600;
    font-size: 52px; line-height: 1; color: var(--rose-bright);
  }
  .stat small {
    display:block; font-family: var(--label); text-transform: uppercase;
    letter-spacing: .28em; font-size: 10px; color: rgba(247,244,213,.7); margin-top: 10px;
  }

  /* ===== TOOLBAR ===== */
  .toolbar { padding: 22px 24px 6px; position: relative; }
  .search-wrap { position: relative; }
  .search-wrap svg { position:absolute; left:14px; top:50%; transform:translateY(-50%); opacity:.5; }
  #search {
    width: 100%; font-family: var(--body); font-size: 16px; color: var(--ink);
    background: rgba(255,255,255,.55); border: 1px solid var(--line);
    border-radius: 100px; padding: 12px 16px 12px 40px; outline: none;
    transition: border-color .2s cubic-bezier(.2,0,0,1), background .2s;
  }
  #search::placeholder { color: rgba(65,102,136,.4); }
  #search:focus { border-color: var(--rose); background:#fff; }

  .meta-row {
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding: 12px 24px 4px; font-family: var(--label); font-size: 11px; color: var(--ink-soft);
  }
  .updated { letter-spacing: .04em; }
  .btn-refresh {
    font-family: var(--label); font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--rose-deep); background: none; border: 1px solid var(--line); border-radius: 100px;
    padding: 7px 14px; cursor: pointer; display:inline-flex; align-items:center; gap:7px;
    transition: border-color .2s, color .2s, transform .15s cubic-bezier(.2,0,0,1);
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
  }
  .btn-refresh:active { transform: scale(.95); }
  @media (hover:hover){ .btn-refresh:hover { border-color: var(--rose); } }
  .btn-refresh svg { transition: transform .6s cubic-bezier(.2,0,0,1); }
  .btn-refresh.spinning svg { transform: rotate(360deg); }

  /* ===== LISTA ===== */
  .list { padding: 8px 20px 0; position: relative; z-index: 1; }

  .entry {
    background: rgba(255,255,255,.5);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 18px 16px;
    margin-top: 14px;
    position: relative;
    animation: rise .5s cubic-bezier(.2,0,0,1) both;
  }
  @keyframes rise { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform:none; } }

  .entry-head { display:flex; align-items:flex-start; gap:12px; }
  .entry-name {
    flex: 1; min-width: 0;
    font-family: var(--display); font-weight: 600; font-size: 23px; line-height: 1.1;
    color: var(--ink); letter-spacing: .01em;
  }
  .count-badge {
    flex-shrink: 0; min-width: 34px; height: 34px; padding: 0 10px;
    display: inline-flex; align-items: center; justify-content: center; gap: 5px;
    background: var(--rose); color: #fff; border-radius: 100px;
    font-family: var(--label); font-weight: 500; font-size: 13px; letter-spacing: .02em;
    box-shadow: 0 2px 8px rgba(190,126,113,.35);
  }
  .companions { margin: 12px 0 0; padding: 0; list-style: none; }
  .companions li {
    display:flex; align-items:center; gap:9px; padding: 5px 0;
    font-family: var(--body); font-size: 16.5px; color: var(--ink);
    border-top: 1px dashed var(--line);
  }
  .companions li .diamond { width:5px; height:5px; transform:rotate(45deg); background: var(--moss); flex-shrink:0; }

  .entry-foot { display:flex; align-items:center; flex-wrap:wrap; gap:8px 14px; margin-top: 14px; }
  .wa {
    display:inline-flex; align-items:center; gap:7px; text-decoration:none;
    font-family: var(--label); font-size: 12.5px; letter-spacing: .02em; color: var(--rose-deep);
    -webkit-tap-highlight-color: transparent;
  }
  @media (hover:hover){ .wa:hover { color: var(--ink); } }
  .wa svg { flex-shrink:0; }
  .stamp { font-family: var(--label); font-size: 11px; color: rgba(65,102,136,.45); letter-spacing:.03em; margin-left:auto; }

  .recado {
    margin-top: 13px; padding: 12px 14px 12px 16px;
    background: rgba(211,150,140,.1); border-left: 2px solid var(--rose);
    border-radius: 0 8px 8px 0;
    font-family: var(--body); font-style: italic; font-size: 16px; line-height: 1.5; color: #59362f;
  }
  .recado .who { font-style: normal; font-family: var(--label); font-size: 10px; text-transform: uppercase; letter-spacing:.16em; color: var(--rose-deep); display:block; margin-bottom: 4px; }

  .entry.removed { opacity: .5; }
  .entry.removed .entry-name { text-decoration: line-through; text-decoration-color: rgba(65,102,136,.35); }

  /* toggle removidos */
  .removed-toggle {
    display:block; width: calc(100% - 40px); margin: 22px 20px 0; padding: 11px;
    background: none; border: 1px dashed var(--line); border-radius: 100px; cursor: pointer;
    font-family: var(--label); font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--ink-soft); transition: border-color .2s; -webkit-tap-highlight-color: transparent;
  }
  @media (hover:hover){ .removed-toggle:hover { border-color: var(--rose); } }

  .section-label {
    text-align:center; font-family: var(--label); text-transform: uppercase; letter-spacing:.24em;
    font-size: 10px; color: var(--ink-soft); margin: 26px 0 2px;
  }

  /* ===== ESTADOS ===== */
  .state { text-align:center; padding: 60px 34px; color: var(--ink-soft); }
  .state .mark { font-family: 'Pinyon Script', cursive; font-size: 40px; color: var(--rose); line-height:1; margin-bottom: 10px; }
  .state h3 { font-family: var(--display); font-weight: 500; font-size: 26px; color: var(--ink); margin: 0 0 8px; }
  .state p { font-family: var(--body); font-size: 16px; line-height: 1.55; margin: 0 auto; max-width: 300px; }
  .state button {
    margin-top: 18px; font-family: var(--label); font-size: 12px; letter-spacing:.14em; text-transform:uppercase;
    background: var(--ink); color: var(--paper); border: none; border-radius: 100px; padding: 12px 26px; cursor: pointer;
    transition: transform .15s cubic-bezier(.2,0,0,1); touch-action: manipulation;
  }
  .state button:active { transform: scale(.96); }

  .spinner { width: 30px; height: 30px; margin: 0 auto 14px; border: 2px solid var(--line); border-top-color: var(--rose); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* gate de chave */
  .gate label { display:block; font-family: var(--label); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color: var(--ink-soft); margin-bottom: 10px; }
  .gate input { width: 100%; max-width: 280px; font-family: var(--body); font-size:16px; text-align:center; padding: 12px 16px; border:1px solid var(--line); border-radius:100px; outline:none; }
  .gate input:focus { border-color: var(--rose); }

  footer { text-align:center; padding: 30px 24px 4px; }
  footer .flourish { color: var(--rose); font-size: 22px; }
  footer a { font-family: var(--label); font-size: 11px; letter-spacing:.1em; color: var(--ink-soft); text-decoration: none; text-transform: uppercase; }
  @media (hover:hover){ footer a:hover { color: var(--rose-deep); } }

  @media (prefers-reduced-motion: reduce) {
    .entry, .spinner, .btn-refresh svg { animation: none !important; transition: none !important; }
    .btn-refresh.spinning svg { transform: none; }
  }
</style>
</head>
<body>
<div class="page" id="page">

  <header>
    <div class="frame-in"></div>
    <img class="illus illus-d" src="./assets/dark-bg/chave.webp" alt="" style="right:-26px; top:-18px; width:120px; opacity:.4; transform:rotate(14deg);">
    <img class="illus illus-d" src="./assets/dark-bg/relogio.webp" alt="" style="left:-24px; bottom:-30px; width:104px; opacity:.26;">
    <div class="eyebrow">Chá de Bebê da Alice</div>
    <div class="flourish">quem vem ao</div>
    <h1>Chá da Alice</h1>
    <div class="rule"><span class="l"></span><span class="d"></span><span class="l"></span></div>
  </header>

  <div class="stats" id="stats" hidden>
    <div class="stat"><b id="st-pessoas">–</b><small>Convidados confirmados</small></div>
  </div>

  <div class="toolbar" id="toolbar" hidden>
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#416688" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input id="search" type="search" inputmode="search" placeholder="Buscar por nome, telefone…" autocomplete="off">
    </div>
  </div>

  <div class="meta-row" id="meta" hidden>
    <span class="updated" id="updated"></span>
    <button class="btn-refresh" id="refresh" type="button" aria-label="Atualizar">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v5h-5"/></svg>
      Atualizar
    </button>
  </div>

  <div class="list" id="list"></div>

  <footer>
    <div class="flourish">fim</div>
    <a href="./index.html">← voltar ao convite</a>
  </footer>
</div>

<script>
(function () {
  var cfg = window.ALICE_INVITE_CONFIG || {};
  var listEl = document.getElementById('list');
  var LS_KEY = 'alice-painel-key';

  // chave: ?key= na URL  →  localStorage  →  config.painelKey
  var url = new URL(location.href);
  var urlKey = url.searchParams.get('key');
  if (urlKey) { try { localStorage.setItem(LS_KEY, urlKey); } catch (e) {} }
  function currentKey() {
    var k = urlKey;
    if (!k) { try { k = localStorage.getItem(LS_KEY); } catch (e) {} }
    return k || cfg.painelKey || '';
  }

  var state = { groups: [], showRemoved: false, filter: '' };

  function show(part, on) { var el = document.getElementById(part); if (el) el.hidden = !on; }
  function esc(s) { return String(s).replace(/[&<>"']/g, function (c) { return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]); }); }

  function relTime(ms) {
    if (!ms) return '';
    var diff = Date.now() - ms, min = Math.round(diff / 60000);
    if (min < 1) return 'agora mesmo';
    if (min < 60) return 'há ' + min + ' min';
    var h = Math.round(min / 60);
    if (h < 24) return 'há ' + h + 'h';
    var d = Math.round(h / 24);
    if (d === 1) return 'ontem';
    if (d < 30) return 'há ' + d + ' dias';
    var dt = new Date(ms);
    return dt.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
  }

  function renderStates(html) { listEl.innerHTML = html; }

  function loading() {
    show('stats', false); show('toolbar', false); show('meta', false);
    renderStates('<div class="state"><div class="spinner"></div><p>Abrindo o livro de convidados…</p></div>');
  }

  function errorState(msg, needsKey) {
    show('stats', false); show('toolbar', false); show('meta', false);
    if (needsKey) {
      renderStates(
        '<div class="state gate">' +
          '<div class="mark">?</div>' +
          '<h3>Chave necessária</h3>' +
          '<p>Digite a chave de acesso combinada para ver as confirmações.</p>' +
          '<div style="margin-top:16px"><input id="keyInput" type="text" inputmode="text" placeholder="chave de acesso" autocomplete="off"></div>' +
          '<button id="keyBtn" type="button">Entrar</button>' +
        '</div>'
      );
      var inp = document.getElementById('keyInput');
      var go = function () {
        var v = (inp.value || '').trim();
        if (!v) return;
        try { localStorage.setItem(LS_KEY, v); } catch (e) {}
        urlKey = v; load();
      };
      document.getElementById('keyBtn').onclick = go;
      inp.addEventListener('keydown', function (e) { if (e.key === 'Enter') go(); });
      inp.focus();
      return;
    }
    renderStates(
      '<div class="state">' +
        '<div class="mark">!</div>' +
        '<h3>Não consegui abrir</h3>' +
        '<p>' + esc(msg || 'Verifique a conexão e tente de novo.') + '</p>' +
        '<button id="retry" type="button">Tentar de novo</button>' +
      '</div>'
    );
    document.getElementById('retry').onclick = load;
  }

  function emptyState() {
    show('meta', true);
    renderStates(
      '<div class="state">' +
        '<div class="mark">∅</div>' +
        '<h3>Ainda ninguém</h3>' +
        '<p>Assim que alguém confirmar presença no convite, o nome aparece aqui.</p>' +
      '</div>'
    );
  }

  function personMatches(p, f) {
    if (!f) return true;
    return (p.nome + ' ' + p.pretty + ' ' + p.whatsapp + ' ' + p.recado).toLowerCase().indexOf(f) !== -1;
  }
  function groupMatches(g, f) {
    if (!f) return true;
    return g.people.some(function (p) { return personMatches(p, f); });
  }

  function entryHTML(g, removed) {
    var people = g.people.filter(function (p) {
      return removed ? p.status === 'Removido' : p.status !== 'Removido';
    });
    if (!people.length) return '';

    var principal = people[0];
    var companions = people.slice(1);
    var total = people.length;

    var wa = '';
    if (principal.whatsapp) {
      var digits = principal.whatsapp.length <= 11 ? '55' + principal.whatsapp : principal.whatsapp;
      wa = '<a class="wa" href="https://wa.me/' + esc(digits) + '" target="_blank" rel="noopener">' +
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.7 4.8-1.3A10 10 0 1 0 12 2Zm5.5 14.2c-.2.6-1.2 1.2-1.7 1.2-.4.1-1 .1-1.6-.1-.4-.1-.9-.3-1.5-.5-2.6-1.1-4.3-3.8-4.4-4-.1-.2-1-1.4-1-2.6s.6-1.8.9-2.1c.2-.2.4-.3.6-.3h.4c.1 0 .3 0 .5.4l.7 1.6c.1.1.1.3 0 .5l-.3.4-.3.3c-.1.1-.2.3-.1.5.1.2.6 1 1.3 1.6.9.8 1.6 1 1.8 1.1.2.1.3.1.5-.1l.6-.7c.2-.2.3-.2.5-.1l1.6.7c.2.1.4.2.4.3.1.1.1.6-.1 1.1Z"/></svg>' +
        esc(principal.pretty || principal.whatsapp) + '</a>';
    }

    var comps = companions.length
      ? '<ul class="companions">' + companions.map(function (c) {
          return '<li><span class="diamond"></span>' + esc(c.nome) + '</li>';
        }).join('') + '</ul>'
      : '';

    var recados = people.filter(function (p) { return p.recado; }).map(function (p) {
      var who = total > 1 ? '<span class="who">' + esc(p.nome) + '</span>' : '';
      return '<div class="recado">' + who + '“' + esc(p.recado) + '”</div>';
    }).join('');

    return '<div class="entry' + (removed ? ' removed' : '') + '">' +
      '<div class="entry-head">' +
        '<div class="entry-name">' + esc(principal.nome) + '</div>' +
        '<span class="count-badge">' +
          '<svg width="12" height="12" viewBox="0 0 24 24" fill="#fff"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2c-4 0-8 2-8 5v1h16v-1c0-3-4-5-8-5Z"/></svg>' +
          total +
        '</span>' +
      '</div>' +
      comps +
      recados +
      '<div class="entry-foot">' + wa + '<span class="stamp">' + esc(relTime(g.updatedAt)) + '</span></div>' +
    '</div>';
  }

  function render() {
    var f = state.filter;
    var active = state.groups.filter(function (g) {
      return g.people.some(function (p) { return p.status !== 'Removido'; });
    });
    var visibleActive = active.filter(function (g) { return groupMatches(g, f); });

    if (!active.length) { emptyState(); return; }

    var html = visibleActive.map(function (g) { return entryHTML(g, false); }).join('');

    if (f && !visibleActive.length) {
      html = '<div class="state"><div class="mark">∅</div><h3>Nada encontrado</h3><p>Nenhum convidado com “' + esc(f) + '”.</p></div>';
    }

    var removedGroups = state.groups.filter(function (g) {
      return g.people.some(function (p) { return p.status === 'Removido'; }) && groupMatches(g, f);
    });
    if (removedGroups.length) {
      html += '<button class="removed-toggle" id="rmToggle">' +
        (state.showRemoved ? 'ocultar removidos' : 'mostrar ' + removedGroups.length + ' removido' + (removedGroups.length > 1 ? 's' : '')) +
      '</button>';
      if (state.showRemoved) {
        html += '<div class="section-label">Saíram da lista</div>';
        html += removedGroups.map(function (g) { return entryHTML(g, true); }).join('');
      }
    }

    listEl.innerHTML = html;
    var t = document.getElementById('rmToggle');
    if (t) t.onclick = function () { state.showRemoved = !state.showRemoved; render(); };
  }

  function computeStats() {
    var pessoas = 0;
    state.groups.forEach(function (g) {
      pessoas += g.people.filter(function (p) { return p.status !== 'Removido'; }).length;
    });
    document.getElementById('st-pessoas').textContent = pessoas;
  }

  function onData(data) {
    state.groups = data.groups || [];
    computeStats();
    show('stats', true); show('toolbar', true); show('meta', true);
    document.getElementById('updated').textContent = 'Atualizado ' + relTime(Date.now());
    render();
  }

  var refreshBtn = document.getElementById('refresh');
  function load() {
    var base = cfg.appsScriptUrl;
    if (!base) { errorState('Configure appsScriptUrl em scripts/config.js.'); return; }
    var key = currentKey();
    if (refreshBtn) refreshBtn.classList.add('spinning');
    if (!state.groups.length) loading();

    var endpoint = base + (base.indexOf('?') === -1 ? '?' : '&') +
      'action=list&key=' + encodeURIComponent(key) + '&_=' + Date.now();

    fetch(endpoint, { method: 'GET' })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (refreshBtn) refreshBtn.classList.remove('spinning');
        if (!data || data.ok === false) {
          var msg = (data && data.error) || 'Resposta inesperada.';
          if (/chave/i.test(msg)) { try { localStorage.removeItem(LS_KEY); } catch (e) {} errorState(msg, true); }
          else errorState(msg);
          return;
        }
        onData(data);
      })
      .catch(function (err) {
        if (refreshBtn) refreshBtn.classList.remove('spinning');
        errorState('Não deu para carregar. ' + (err && err.message ? '(' + err.message + ')' : ''));
      });
  }

  refreshBtn.addEventListener('click', load);
  var searchEl = document.getElementById('search');
  var deb;
  searchEl.addEventListener('input', function () {
    clearTimeout(deb);
    deb = setTimeout(function () { state.filter = searchEl.value.trim().toLowerCase(); render(); }, 120);
  });

  // recarrega ao voltar para a aba (dados podem ter mudado)
  document.addEventListener('visibilitychange', function () {
    if (!document.hidden && state.groups.length) load();
  });

  load();
})();
</script>
</body>
</html>
